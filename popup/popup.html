<!doctype html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NJU Auto Auth Login</title><link rel="stylesheet" href="popup.css"><body><main class="container"><header class="header"><div class="brand"><img src="../icons/icon128.png"><div><h1>NJU 自动认证</h1><p>统一身份认证助手</p></div></div><div class="status-card" id="statusCard"><div class="status-indicator"><i class="status-dot" id="statusDot"></i><b class="status-text" id="statusText">未配置</b></div><small>下次检查 <strong id="nextCheckTime">-</strong></small></div></header><section class="form-section"><div class="form-group"><label for="username">学号 / 工号</label><input id="username" placeholder="请输入学号或工号" autocomplete="off"></div><div class="form-group"><label for="password">密码</label><input type="password" id="password" placeholder="请输入密码" autocomplete="off"><button class="toggle-password" id="togglePassword" type="button"><span class="eye-open">◉</span><span class="eye-closed" style="display:none">○</span></button></div><button class="btn" id="saveBtn">保存学号和密码</button><div class="settings-card"><div class="auth-settings"><div class="toggle-row"><div><label for="authAutoLoginToggle">统一身份认证自动登录</label><span>访问认证页时自动完成登录</span></div><label class="toggle-switch"><input type="checkbox" id="authAutoLoginToggle"><i></i></label></div><div class="toggle-row toggle-row-child" id="periodicCheckRow"><div><label for="periodicCheckToggle">定时检查登录情况</label><span>定期保持登录状态有效</span></div><label class="toggle-switch"><input type="checkbox" id="periodicCheckToggle"><i></i></label></div></div><div class="toggle-row"><div><label for="courseAutoLoginToggle">选课页面自动登录</label><span>进入选课系统时自动登录</span></div><label class="toggle-switch"><input type="checkbox" id="courseAutoLoginToggle"><i></i></label></div></div></section><section class="log-section"><div class="log-header">运行日志 <button class="btn-clear" id="clearLogBtn">清空</button></div><div class="log-area" id="logArea"><div class="log-empty">暂无日志</div></div></section></main><script src="popup.js"></script></body></html>
