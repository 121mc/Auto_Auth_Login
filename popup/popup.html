<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJU Auto Auth Login</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <img src="../icons/icon128.png" alt="Logo" class="logo-icon">
        <div>
          <h1>NJU 自动认证</h1>
          <p class="subtitle">统一身份认证自动登录</p>
        </div>
      </div>
    </div>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">未配置</span>
      </div>
      <div class="status-details">
        <div class="detail-row">
          <span class="detail-label">上次检查</span>
          <span class="detail-value" id="lastCheckTime">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">下次检查</span>
          <span class="detail-value" id="nextCheckTime">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">登录次数</span>
          <span class="detail-value" id="loginCount">0</span>
        </div>
      </div>
    </div>

    <!-- Settings Form -->
    <div class="form-section">
      <div class="form-group">
        <label for="username">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          学号 / 工号
        </label>
        <input type="text" id="username" placeholder="请输入学号或工号" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          密码
        </label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
        <button class="toggle-password" id="togglePassword" type="button" title="显示/隐藏密码">
          <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>

      <!-- Enable Toggle -->
      <div class="toggle-row">
        <label for="enableToggle">启用自动登录</label>
        <label class="toggle-switch">
          <input type="checkbox" id="enableToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-primary" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        保存设置
      </button>
      <button class="btn btn-secondary" id="checkNowBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        立即检查
      </button>
    </div>

    <!-- Log Area -->
    <div class="log-section">
      <div class="log-header">
        <span>运行日志</span>
        <button class="btn-clear" id="clearLogBtn" title="清空日志">清空</button>
      </div>
      <div class="log-area" id="logArea">
        <div class="log-empty">暂无日志</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>NJU Auto Auth v1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
